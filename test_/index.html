<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML to JS Input Example</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Learn: Taking Input from HTML to JavaScript</h1>
        
        <div class="form-section">
            <h2>User Information Form</h2>
            
            <!-- Text Input -->
            <div class="form-group">
                <label for="name">Enter Your Name:</label>
                <input type="text" id="name" placeholder="Type your name here">
            </div>

            <!-- Number Input -->
            <div class="form-group">
                <label for="age">Enter Your Age:</label>
                <input type="number" id="age" placeholder="Enter a number">
            </div>

            <!-- Email Input -->
            <div class="form-group">
                <label for="email">Enter Your Email:</label>
                <input type="email" id="email" placeholder="example@email.com">
            </div>

            <!-- Dropdown/Select -->
            <div class="form-group">
                <label for="country">Select Your Country:</label>
                <select id="country">
                    <option value="">Choose...</option>
                    <option value="India">India</option>
                    <option value="USA">USA</option>
                    <option value="UK">UK</option>
                    <option value="Canada">Canada</option>
                </select>
            </div>

            <!-- Checkbox -->
            <div class="form-group">
                <label>
                    <input type="checkbox" id="subscribe"> Subscribe to newsletter
                </label>
            </div>

            <!-- Radio Buttons -->
            <div class="form-group">
                <label>Gender:</label>
                <label>
                    <input type="radio" name="gender" value="Male"> Male
                </label>
                <label>
                    <input type="radio" name="gender" value="Female"> Female
                </label>
                <label>
                    <input type="radio" name="gender" value="Other"> Other
                </label>
            </div>

            <!-- Textarea -->
            <div class="form-group">
                <label for="message">Your Message:</label>
                <textarea id="message" placeholder="Write something here..." rows="4"></textarea>
            </div>

            <!-- Buttons -->
            <div class="button-group">
                <button id="submitBtn" class="btn btn-primary">Submit</button>
                <button id="clearBtn" class="btn btn-secondary">Clear All</button>
            </div>
        </div>

        <!-- Output Section -->
        <div class="output-section">
            <h2>Output (Processed Data):</h2>
            <div id="output" class="output-box">
                <p>Fill the form and click Submit to see the output here</p>
            </div>
        </div>

        <!-- Examples Section -->
        <div class="examples-section">
            <h2>Quick Examples:</h2>
            
            <div class="example">
                <h3>Simple Calculator</h3>
                <div class="form-group">
                    <input type="number" id="num1" placeholder="Enter first number">
                    <input type="number" id="num2" placeholder="Enter second number">
                </div>
                <button id="calculateBtn" class="btn btn-small">Add Numbers</button>
                <p id="calcResult"></p>
            </div>

            <div class="example">
                <h3>Text Manipulation</h3>
                <div class="form-group">
                    <input type="text" id="textInput" placeholder="Enter any text">
                </div>
                <button id="upperBtn" class="btn btn-small">Convert to UPPERCASE</button>
                <button id="lowerBtn" class="btn btn-small">Convert to lowercase</button>
                <p id="textResult"></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
