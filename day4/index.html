<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>

</head>
<body>
    <h1>Student Registration Form</h1>
    <form>
        <label for="name">Name:</label>
        <input type="text" id="name" placeholder="John Doe" name="name" required><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="abc@example.com" name="email" required><br><br>

        <label for="age">Age:</label>
        <input type="number" id="age" name="age" required><br><br>
        <label for="DOB">Date of Birth:</label>
        <input type="date" id="DOB" name="DOB" required><br><br>

        <label for="employment">Employment Status:</label>
        <select id="employment" name="employment" required>
            <option value="">Select...</option>
            <option value="part-time">Part-time</option>
            <option value="full-time">Full-time</option>
        </select><br><br>
        
        <label for="upload_resume">Upload Resume:</label>
        <input type="file" id="upload_resume" name="upload_resume" accept=".pdf,.doc,.docx" required><br>


        <label for="gender">Gender:</label>
        <input type="radio" id="male" name="gender" value="male" required>
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="female" required>
        <label for="female">Female</label>
        <input type="radio" id="other" name="gender" value="other" required>
        <label for="other">Other</label><br><br>

        <input type="button" value="Submit" gap="10"> 
        <input type="submit" value="Register"><br>

        <label for="description">Description:</label><br>
        <textarea id="description" name="description" rows="4" cols="50" placeholder="Write something about yourself..."></textarea><br><br>
    </form>    
</body>
</html>
